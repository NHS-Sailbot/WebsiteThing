<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sailbot Helper Interface Terminal</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="js/leaflet.rotatedMarker.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <script src="js/main.js"></script>
    <script src="js/communication.js"></script>
</head>
<body>
    <div id="top-left-corner">
        <div id="website-telemetry">
        </div>
        <div id="telemetry">NOT CONNECTED</div>
        <div class="camera-image">
            <button id="camera-button">Get Machine Vision Image</button>
            <img id="camera-image" src="" alt="Camera Image" style="display: none;" />
        </div>
        <div id="games-buttons">
        <button onclick="window.open('https://Balatro.computery.dev', '_blank')">Balatro</button>
        <button onclick="window.open('https://Nubbys.computery.dev', '_blank')">NNF</button>
    </div>
    </div>
    <div id="top-right-corner">
        <div id="compass">
            <div id="compass-container">
                <div id="compass-rose">
                    <div class="compass-marker n-marker">N</div>
                    <div class="compass-marker e-marker">E</div>
                    <div class="compass-marker s-marker">S</div>
                    <div class="compass-marker w-marker">W</div>
                    <svg id="compass-wind-arrow" viewBox="0 0 50 100">
                        <polygon points="25,0 50,85 25,70 0,85" fill="rgba(139, 125, 255)"/>
                    </svg>
                    <svg id="compass-heading-arrow" viewBox="0 0 50 100">
                        <polygon points="25,0 35,85 25,70 15,85" fill="rgb(30, 30, 30);"/>
                    </svg>
                </div>
            </div>
        </div>
        <div id="log-container">
            <button id="openLog" onclick="openLog()">Open Log</button>
            <textarea id="log-textbox" readonly></textarea>
        </div>
    </div>
    <div id="ui-controls">
        <input id="text-input" type="text" placeholder="Text Input" />
        <div class="button-grid">
            <button id="place-waypoint-button">Place Waypoint</button>
            <button id="clear-waypoints-button">Clear Waypoints</button>
            <button id="place-restricted-area-button">Place Restricted Area</button>
            <button id="clear-restricted-area-button">Clear Restricted Area</button>
            <button id="place-buoys-button">Place Buoys</button>
            <button id="clear-buoys-button">Clear Buoys</button>
            <button id="enter-coordinates-button">Enter Coordinates</button>
            <button id="follow-boat-button">Follow Boat</button>
            <button id="export-button">Export Waypoints</button>
            <button id="import-button">Import Waypoints</button>

        </div>
    </div>
    <div id="map"></div>
</body>
</html>
